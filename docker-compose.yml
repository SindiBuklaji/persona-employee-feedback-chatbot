version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: thesis_chatbot_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: thesis_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thesis_chatbot_backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password123@postgres:5432/thesis_chatbot
      DEBUG: "true"
      RETRIEVAL_ENABLED: "true"
      RETRIEVAL_USE_EMBEDDINGS: "true"
      RETRIEVAL_LOGGING_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - chatbot_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thesis_chatbot_frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - chatbot_network

volumes:
  postgres_data:

networks:
  chatbot_network:
    driver: bridge
